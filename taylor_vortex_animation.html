<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Taylor–Couette Flow</title>
<style>
  html,body{margin:0;height:100%;background:#ffffff;overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;color:#1a1a1a;}
  #stage{position:fixed;inset:0;display:flex;flex-direction:column;}
  #canvasWrap{position:relative;flex:1 1 auto;min-height:0;}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block;}

  /* ── control bar ── */
  #bar{flex:0 0 auto;display:flex;align-items:center;gap:18px;
    padding:12px 26px 16px;border-top:1px solid #ececf0;background:#ffffff;
    -webkit-user-select:none;user-select:none;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
    height:36px;padding:0 15px;border-radius:8px;cursor:pointer;font-size:13.5px;font-weight:600;
    color:#1a1a1a;background:#f3f4f6;border:1px solid #d9dde2;
    transition:background .15s,border-color .15s;white-space:nowrap;font-family:inherit;}
  .btn:hover{background:#e9ebef;border-color:#c4cad1;}
  .btn svg{width:13px;height:13px;fill:currentColor;}
  .slwrap{flex:1 1 auto;display:flex;align-items:center;gap:12px;min-width:180px;}
  .slwrap label{font-size:13px;color:#4b5563;font-weight:700;white-space:nowrap;}
  input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:5px;border-radius:3px;
    background:#dde1e6;outline:none;cursor:pointer;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;border-radius:50%;
    background:#fff;border:2px solid #2f7fb5;box-shadow:0 1px 3px rgba(0,0,0,.2);cursor:grab;}
  input[type=range]::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:#fff;
    border:2px solid #2f7fb5;cursor:grab;}
  #omval{font-variant-numeric:tabular-nums;font-size:13px;color:#374151;min-width:118px;text-align:right;white-space:nowrap;}
  #omval b{color:#2f7fb5;font-weight:700;}
  @media (max-width:720px){ #bar{gap:12px;padding:10px 14px;flex-wrap:wrap;} .slwrap{order:3;flex-basis:100%;} }
</style>
</head>
<body>
<div id="stage">
  <div id="canvasWrap"><canvas id="c"></canvas></div>
  <div id="bar">
    <button class="btn" id="playBtn" aria-label="Play or pause">
      <svg id="playIcon" viewBox="0 0 16 16"><path d="M4 3h3v10H4zM9 3h3v10H9z"/></svg><span id="playLbl">Pause</span>
    </button>
    <button class="btn" id="replayBtn" aria-label="Replay from start">
      <svg viewBox="0 0 16 16"><path d="M8 3V0.5L4.5 4 8 7.5V5a3 3 0 1 1-3 3H3.4A4.6 4.6 0 1 0 8 3z"/></svg>Replay
    </button>
    <div class="slwrap">
      <label for="omega">Ω</label>
      <input type="range" id="omega" min="0" max="4" step="0.01" value="0">
    </div>
    <div id="omval">Ω <b>0.00</b> rad/s</div>
  </div>
</div>
<script>
(function(){
"use strict";

// ── logical drawing size ────────────────────────────────────────────
const LW = 1280, LH = 600;
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const flow = document.createElement("canvas");   // offscreen buffer for tracer trails
const fctx = flow.getContext("2d");

let dpr=1, scale=1, offX=0, offY=0, cssW=LW, cssH=LH;
function resize(){
  dpr = Math.min(window.devicePixelRatio||1, 2);
  const wrap = canvas.parentElement.getBoundingClientRect();
  cssW = wrap.width; cssH = wrap.height;
  scale = Math.min(cssW/LW, cssH/LH);
  offX = (cssW - LW*scale)/2; offY = (cssH - LH*scale)/2;
  for(const cv of [canvas, flow]){ cv.width=Math.round(cssW*dpr); cv.height=Math.round(cssH*dpr); }
  canvas.style.width=cssW+"px"; canvas.style.height=cssH+"px";
}
function logical(c){ c.setTransform(scale*dpr,0,0,scale*dpr, offX*dpr, offY*dpr); }
function identity(c){ c.setTransform(1,0,0,1,0,0); }
window.addEventListener("resize", resize);
resize();

// ── palette (light) ─────────────────────────────────────────────────
const COL = {
  ink:"#1a1a1a", muted:"#6b7280", faint:"#9aa3ad",
  glass:"#2f7fb5", glassGlow:"rgba(47,127,181,0.16)",
  gap:"rgba(90,150,200,0.055)",
  warm:[210,84,36],    // outward radial jet
  cool:[37,99,164],    // inward radial jet
  calm:[96,124,150],   // neutral
  dye:[45,110,180],
};

// ── geometry (r–z hero cross-section) ───────────────────────────────
const centerX = 420, viewTop = 78, viewH = 420, viewBot = viewTop+viewH;
const innerHalf = 52, gapW = 52;
const wInnerR = centerX+innerHalf, wInnerL = centerX-innerHalf;
const wOuterR = wInnerR+gapW,     wOuterL = wInnerL-gapW;
const nHalf = Math.max(2, Math.round(viewH/gapW));   // integer half-waves ⇒ square cells
const kz = Math.PI*nHalf/viewH;
const cellH = viewH/nHalf;

// ── inset (r–θ top view), no box ────────────────────────────────────
const insCX=1006, insCY=176, insROut=94, insRIn=insROut*(innerHalf/(innerHalf+gapW));

// ── secondary (roll) velocity field, local gap coords x∈[0,gapW] ─────
function field(x, z){
  const sx=Math.sin(Math.PI*x/gapW), cx=Math.cos(Math.PI*x/gapW);
  const sz=Math.sin(kz*z),           cz=Math.cos(kz*z);
  return { ux: kz*sx*cz, uz:-(Math.PI/gapW)*cx*sz };
}
const UX_PEAK = kz, FLOW_K = 1150;

// ── tracer particles ────────────────────────────────────────────────
const NP = 820;
const particles = [];
function spawn(p){
  p.x=2+Math.random()*(gapW-4); p.z=Math.random()*viewH;
  p.ch=Math.random()<0.5?1:-1; p.th=Math.random()*6.283;
  p.life=2.4+Math.random()*3.2; p.age=Math.random()*p.life;
}
function seedParticles(){ particles.length=0; for(let i=0;i<NP;i++){const p={};spawn(p);particles.push(p);} }

// ── dye filaments: straight in laminar flow, wound up by the vortices ─
const FILN=3, FIL_NODES=52, filaments=[];
function straighten(f){ f.nodes.length=0; for(let j=0;j<=FIL_NODES;j++) f.nodes.push({x:f.x0, z:viewH*j/FIL_NODES}); }
function seedFilaments(){
  filaments.length=0;
  for(const ch of [1,-1]) for(let i=0;i<FILN;i++){
    const f={ ch, x0:gapW*(i+0.5)/FILN, nodes:[], phase:Math.random()*6.28,
              age:Math.random()*5, life:4.8+Math.random()*2.2 };
    straighten(f); filaments.push(f);
  }
}
function seedAll(){ seedParticles(); seedFilaments(); seedInset(); }

// ── inset: tracers orbiting at the Couette angular-velocity profile ──
const R2I=insROut*insROut/(insRIn*insRIn);
function profRatio(r){ return (insROut*insROut/(r*r) - 1)/(R2I - 1); }  // 1 at inner wall … 0 at outer
const NINS=150, insP=[];
function seedInset(){ insP.length=0;
  for(let i=0;i<NINS;i++) insP.push({ r:insRIn+2+Math.random()*(insROut-insRIn-4), th:Math.random()*6.283 }); }
seedAll();

// ── dynamics / state ────────────────────────────────────────────────
const K_TA=1.0, TA_C=3.5, TA_MAX=14;
const OM_LOW=1.15, OM_HIGH=3.15;
let omega=0, amp=0, spin=0, autoT=0;
let mode="auto", running=true, last=performance.now();

function smooth(a,b,x){ let t=(x-a)/(b-a); t=Math.min(1,Math.max(0,t)); return t*t*(3-2*t); }
function scheduleOmega(t){
  if(t<1.2) return 0;
  if(t<3.4) return OM_LOW*smooth(1.2,3.4,t);
  if(t<6.0) return OM_LOW;
  if(t<8.4) return OM_LOW+(OM_HIGH-OM_LOW)*smooth(6.0,8.4,t);
  return OM_HIGH;
}
const taOf = om => K_TA*om*om;
function regime(om,a){
  const ta=taOf(om);
  if(om<0.03) return "At rest";
  if(ta<TA_C*0.85) return "Laminar circular Couette flow — smooth azimuthal shear, no rolls";
  if(ta<TA_C*1.05) return "Approaching the critical Taylor number…";
  if(a<0.6) return "Ta > Ta_c — centrifugal instability: Taylor vortices forming";
  return "Supercritical — a steady stack of counter-rotating Taylor vortices";
}

// ── controls ────────────────────────────────────────────────────────
const slider=document.getElementById("omega"), omval=document.getElementById("omval");
const playBtn=document.getElementById("playBtn"), playLbl=document.getElementById("playLbl");
const playIcon=document.getElementById("playIcon");
const ICON_PLAY="M4 3l9 5-9 5z", ICON_PAUSE="M4 3h3v10H4zM9 3h3v10H9z";
function setPlayUI(){ playLbl.textContent=running?"Pause":"Play";
  playIcon.querySelector("path").setAttribute("d", running?ICON_PAUSE:ICON_PLAY); }
slider.addEventListener("input", ()=>{ mode="manual"; running=false; omega=parseFloat(slider.value); setPlayUI(); });
playBtn.addEventListener("click", ()=>{ if(mode==="manual") mode="auto"; running=!running; setPlayUI(); });
document.getElementById("replayBtn").addEventListener("click", replay);
function replay(){ mode="auto"; autoT=0; running=true; amp=0; seedAll();
  identity(fctx); fctx.clearRect(0,0,flow.width,flow.height); setPlayUI(); }
window.addEventListener("keydown", e=>{ if(e.key===" "){e.preventDefault();playBtn.click();}
  else if(e.key==="r"||e.key==="R"){replay();} });

// ── colour: radial velocity → diverging warm/cool ───────────────────
function tracerColor(ux,a){
  const s=Math.max(-1,Math.min(1,ux/UX_PEAK)), jet=s>=0?COL.warm:COL.cool;
  const m=a*Math.min(1,Math.abs(s)*1.15);
  return [ COL.calm[0]+(jet[0]-COL.calm[0])*m,
           COL.calm[1]+(jet[1]-COL.calm[1])*m,
           COL.calm[2]+(jet[2]-COL.calm[2])*m ];
}

// ════════════════════════ DRAW ═════════════════════════════════════
function drawGapAndWalls(){
  ctx.fillStyle=COL.gap;
  ctx.fillRect(wOuterL,viewTop,gapW,viewH); ctx.fillRect(wInnerR,viewTop,gapW,viewH);
  for(const x of [wOuterL,wOuterR]){
    ctx.strokeStyle=COL.glassGlow; ctx.lineWidth=10; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(x,viewTop-2); ctx.lineTo(x,viewBot+2); ctx.stroke();
    ctx.strokeStyle=COL.glass; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(x,viewTop-2); ctx.lineTo(x,viewBot+2); ctx.stroke();
  }
  ctx.lineCap="butt";
}

function drawInnerCylinder(){
  const g=ctx.createLinearGradient(wInnerL,0,wInnerR,0);
  g.addColorStop(0,"#9aa4af"); g.addColorStop(.42,"#dbe1e7");
  g.addColorStop(.6,"#e6eaee"); g.addColorStop(1,"#95a0ab");
  ctx.fillStyle=g; ctx.fillRect(wInnerL,viewTop,innerHalf*2,viewH);
  // scrolling specular bands → reads as a turning cylinder
  ctx.save(); ctx.beginPath(); ctx.rect(wInnerL,viewTop,innerHalf*2,viewH); ctx.clip();
  const cw=innerHalf*2, spacing=cw*0.72, scroll=((spin*22)%spacing+spacing)%spacing;
  for(let bx=wInnerL-spacing; bx<wInnerR+spacing; bx+=spacing){
    const cx=bx+scroll, bw=cw*0.28;
    const bg=ctx.createLinearGradient(cx-bw,0,cx+bw,0);
    bg.addColorStop(0,"rgba(255,255,255,0)"); bg.addColorStop(.5,"rgba(255,255,255,0.55)");
    bg.addColorStop(1,"rgba(255,255,255,0)");
    ctx.fillStyle=bg; ctx.fillRect(cx-bw,viewTop,bw*2,viewH);
  }
  ctx.restore();
  ctx.strokeStyle="#8a94a0"; ctx.lineWidth=1.2;
  ctx.strokeRect(wInnerL,viewTop,innerHalf*2,viewH);
}

function drawTracers(){
  identity(fctx);
  fctx.globalCompositeOperation="destination-out";
  fctx.fillStyle="rgba(0,0,0,0.055)"; fctx.fillRect(0,0,flow.width,flow.height);  // gentle fade → longer trails
  logical(fctx);
  fctx.globalCompositeOperation="source-over";
  const gate=smooth(0.08,0.5,amp);
  for(const p of particles){
    const v=field(p.x,p.z);
    const sx=p.ch>0?wInnerR+p.x:wInnerL-p.x, sy=viewTop+p.z;
    const shimmer=0.5+0.5*(0.5+0.5*Math.sin(p.th));
    const fadeLife=Math.min(1,p.age/0.5)*Math.min(1,(p.life-p.age)/0.6);
    const c=tracerColor(v.ux*p.ch,amp);
    const a=(0.32+0.45*shimmer)*fadeLife*gate;
    fctx.fillStyle=`rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;
    fctx.beginPath(); fctx.arc(sx,sy,1.5,0,6.2832); fctx.fill();
  }
  identity(ctx); ctx.drawImage(flow,0,0); logical(ctx);
}

function drawFilaments(){
  ctx.lineJoin="round"; ctx.lineCap="round";
  for(const f of filaments){
    const fadeIn=Math.min(1,f.age/0.5), tail=Math.min(1,(f.life-f.age)/0.7);
    const shim=0.5+0.5*Math.sin(f.phase);
    // dye lines are a subtle guide once the coloured rolls take over
    const a=(0.26+0.30*shim)*fadeIn*tail*(1-0.45*smooth(0.2,0.7,amp));
    ctx.strokeStyle=`rgba(${COL.dye[0]},${COL.dye[1]},${COL.dye[2]},${a})`; ctx.lineWidth=1.4;
    ctx.beginPath();
    for(let j=0;j<f.nodes.length;j++){
      const n=f.nodes[j], sx=f.ch>0?wInnerR+n.x:wInnerL-n.x, sy=viewTop+n.z;
      j===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);
    }
    ctx.stroke();
  }
  ctx.lineJoin="miter"; ctx.lineCap="butt";
}

// ── top-down inset (no box) ─────────────────────────────────────────
function drawInset(){
  ctx.save();
  // gap + glass ring
  ctx.beginPath(); ctx.arc(insCX,insCY,insROut,0,6.2832);
  ctx.fillStyle="rgba(90,150,200,0.05)"; ctx.fill();
  ctx.lineWidth=10; ctx.strokeStyle=COL.glassGlow; ctx.stroke();
  ctx.lineWidth=3;  ctx.strokeStyle=COL.glass;     ctx.stroke();

  // orbiting tracers — angular speed follows the Couette profile (fast inner, still outer)
  ctx.save(); ctx.beginPath(); ctx.arc(insCX,insCY,insROut-1,0,6.2832); ctx.clip();
  ctx.lineCap="round";
  for(const q of insP){
    const sp=omega*profRatio(q.r), tail=0.05+Math.min(0.42, sp*0.10);
    ctx.strokeStyle=`rgba(${COL.dye[0]},${COL.dye[1]},${COL.dye[2]},0.42)`; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(insCX,insCY,q.r, q.th-tail, q.th); ctx.stroke();
    ctx.fillStyle=`rgba(${COL.dye[0]},${COL.dye[1]},${COL.dye[2]},0.9)`;
    ctx.beginPath(); ctx.arc(insCX+q.r*Math.cos(q.th), insCY+q.r*Math.sin(q.th), 1.7, 0, 6.2832); ctx.fill();
  }
  ctx.restore(); ctx.lineCap="butt";

  // inner cylinder disk + rotating notch (continuous ⇒ shows absolute spin)
  const g=ctx.createRadialGradient(insCX-insRIn*0.4,insCY-insRIn*0.4,3,insCX,insCY,insRIn);
  g.addColorStop(0,"#eef1f4"); g.addColorStop(1,"#aab3bd");
  ctx.beginPath(); ctx.arc(insCX,insCY,insRIn,0,6.2832); ctx.fillStyle=g; ctx.fill();
  ctx.lineWidth=1.4; ctx.strokeStyle="#8a94a0"; ctx.stroke();
  ctx.fillStyle="#6b7280";
  ctx.beginPath(); ctx.arc(insCX+insRIn*0.72*Math.cos(spin), insCY+insRIn*0.72*Math.sin(spin), 3.4, 0, 6.2832); ctx.fill();

  // Ω arc arrow
  const aa=Math.min(1,omega/OM_LOW);
  if(aa>0.04){
    ctx.save(); ctx.globalAlpha=aa; ctx.strokeStyle=COL.glass; ctx.lineWidth=2.4;
    const rr=insRIn+13, a1=1.75;
    ctx.beginPath(); ctx.arc(insCX,insCY,rr,-0.7,a1); ctx.stroke();
    const hx=insCX+rr*Math.cos(a1), hy=insCY+rr*Math.sin(a1), tg=a1+Math.PI/2;
    ctx.fillStyle=COL.glass; ctx.beginPath();
    ctx.moveTo(hx,hy);
    ctx.lineTo(hx-9*Math.cos(tg-0.42),hy-9*Math.sin(tg-0.42));
    ctx.lineTo(hx-9*Math.cos(tg+0.42),hy-9*Math.sin(tg+0.42));
    ctx.closePath(); ctx.fill(); ctx.restore();
  }
  // caption
  ctx.textAlign="center"; ctx.fillStyle=COL.ink; ctx.font="600 13px Arial";
  ctx.fillText("Top view — looking down the axis", insCX, insCY+insROut+30);
  ctx.fillStyle=COL.muted; ctx.font="12px Arial";
  ctx.fillText("inner wall spins fastest → fluid shears across the gap", insCX, insCY+insROut+49);
  ctx.restore();
}

// ── Taylor-number gauge (read-only indicator) ───────────────────────
function drawGauge(){
  const gx=150, gw=520, gy=viewBot+50, gh=8;
  const ta=taOf(omega), frac=Math.min(1,ta/TA_MAX);
  const tx=gx+gw*frac, cx=gx+gw*(TA_C/TA_MAX), sup=ta>=TA_C;
  ctx.textAlign="left"; ctx.fillStyle=COL.muted; ctx.font="700 12px Arial";
  ctx.fillText("TAYLOR  NUMBER", gx, gy-14);
  // track
  roundRect(gx,gy,gw,gh,gh/2); ctx.fillStyle="#e6e9ed"; ctx.fill();
  // filled
  roundRect(gx,gy,Math.max(gh,tx-gx),gh,gh/2);
  ctx.fillStyle=sup?"rgba(210,84,36,0.9)":"rgba(37,99,164,0.85)"; ctx.fill();
  // critical threshold marker
  ctx.strokeStyle="#3a3f47"; ctx.lineWidth=1.6;
  ctx.beginPath(); ctx.moveTo(cx,gy-6); ctx.lineTo(cx,gy+gh+6); ctx.stroke();
  ctx.fillStyle=COL.ink; ctx.font="600 11.5px Arial"; ctx.textAlign="center";
  ctx.fillText("Ta_c (critical)", cx, gy+gh+21);
  // current value: triangle pointer above bar (clearly not draggable)
  ctx.fillStyle=sup?"#d25424":"#2563a4";
  ctx.beginPath(); ctx.moveTo(tx,gy-2); ctx.lineTo(tx-5,gy-9); ctx.lineTo(tx+5,gy-9); ctx.closePath(); ctx.fill();
  // regime word at right
  ctx.textAlign="left"; ctx.font="700 12px Arial"; ctx.fillStyle=sup?"#d25424":"#6b7280";
  ctx.fillText(sup?"SUPERCRITICAL":"subcritical", gx+gw+18, gy+gh);
}

// ── horizontal leader labels ────────────────────────────────────────
function leaderH(tipX, y, labelX, lines){
  ctx.strokeStyle="#b7bec6"; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(labelX, y); ctx.lineTo(tipX, y); ctx.stroke();
  ctx.fillStyle="#8a94a0"; ctx.beginPath(); ctx.arc(tipX,y,2.4,0,6.2832); ctx.fill();
  ctx.textAlign="right";
  const y0 = y - (lines.length-1)*8;
  lines.forEach((t,i)=>{
    ctx.font = i===0 ? "600 13px Arial" : "12px Arial";
    ctx.fillStyle = i===0 ? COL.ink : COL.muted;
    ctx.fillText(t, labelX-8, y0 + i*16 + 4);
  });
}
function drawLabels(){
  leaderH(wOuterL, viewTop+58, 290, ["Borosilicate glass tube","static outer wall"]);
  leaderH(wInnerL-gapW/2, viewTop+viewH*0.5, 290, ["Annular gap","working fluid"]);
  leaderH(wInnerL, viewTop+viewH-64, 290, ["Inner cylinder","rotating — drives the flow"]);

  // λ ≈ gap bracket on the right, once rolls exist
  if(amp>0.5){
    ctx.save(); ctx.globalAlpha=(amp-0.5)/0.5;
    const bx=wOuterR+16, z0=viewTop+cellH*2, z1=z0+2*cellH;
    ctx.strokeStyle="#7f8a96"; ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.moveTo(bx,z0); ctx.lineTo(bx+8,z0); ctx.lineTo(bx+8,z1); ctx.lineTo(bx,z1); ctx.stroke();
    ctx.textAlign="left";
    ctx.fillStyle=COL.ink; ctx.font="italic 12.5px Arial"; ctx.fillText("λ ≈ gap", bx+14,(z0+z1)/2-3);
    ctx.fillStyle=COL.muted; ctx.font="11.5px Arial"; ctx.fillText("one vortex pair", bx+14,(z0+z1)/2+13);
    ctx.restore();
  }
}
function drawLegend(){
  const lx=insCX-insROut, ly=insCY+insROut+78;
  ctx.textAlign="left"; ctx.font="700 11.5px Arial"; ctx.fillStyle=COL.muted;
  ctx.fillText("TRACER COLOUR", lx, ly);
  const row=(y,rgb,txt)=>{
    ctx.fillStyle=`rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
    ctx.beginPath(); ctx.arc(lx+5,y-4,5,0,6.2832); ctx.fill();
    ctx.fillStyle=COL.ink; ctx.font="12.5px Arial"; ctx.fillText(txt, lx+18, y);
  };
  row(ly+20, COL.warm, "radial outflow — fluid thrown outward");
  row(ly+40, COL.cool, "radial inflow — returning to the core");
}
function drawState(){
  ctx.textAlign="left"; ctx.fillStyle="#334155"; ctx.font="14.5px Arial";
  ctx.fillText(regime(omega,amp), 150, 46);
}

function roundRect(x,y,w,h,r){
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

// ════════════════════════ FRAME ════════════════════════════════════
function frame(now){
  const dt=Math.min((now-last)/1000,0.05); last=now;
  if(mode==="auto" && running){ autoT+=dt; omega=scheduleOmega(autoT); slider.value=omega.toFixed(2); }
  omval.innerHTML="Ω <b>"+omega.toFixed(2)+"</b> rad/s";

  amp += (smooth(TA_C,TA_C*1.8,taOf(omega))-amp)*Math.min(1,dt*1.7);
  spin += omega*dt;
  for(const q of insP){ q.th += omega*profRatio(q.r)*dt; if(q.th>6.2832) q.th-=6.2832; }

  for(const p of particles){
    const v=field(p.x,p.z);
    p.x+=v.ux*amp*FLOW_K*dt; p.z+=v.uz*amp*FLOW_K*dt;
    p.th+=omega*(1-p.x/gapW)*dt*3.4;
    if(p.x<0.5||p.x>gapW-0.5||p.z<0||p.z>viewH){ spawn(p); p.age=0; continue; }
    p.age+=dt; if(p.age>p.life) spawn(p);
  }
  for(const f of filaments){
    f.age+=dt; f.phase+=omega*(1-f.x0/gapW)*dt*2.6;
    if(amp>0.01) for(const n of f.nodes){
      const v=field(n.x,n.z);
      n.x=Math.min(gapW-0.5,Math.max(0.5,n.x+v.ux*amp*FLOW_K*dt));
      n.z=Math.min(viewH,Math.max(0,n.z+v.uz*amp*FLOW_K*dt));
    }
    if(f.age>f.life){ straighten(f); f.age=0; }
  }

  logical(ctx);
  ctx.clearRect(-offX/scale,-offY/scale, LW+2*offX/scale, LH+2*offY/scale);
  drawGapAndWalls();
  drawTracers();
  drawFilaments();
  drawInnerCylinder();
  drawState();
  drawLabels();
  drawInset();
  drawGauge();
  drawLegend();
  requestAnimationFrame(frame);
}
setPlayUI();
requestAnimationFrame(frame);
})();
</script>
